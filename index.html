<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="글로벌 주요 증시 및 한/미 섹터 분석 웹사이트">
    <title>Tony's Stock Today | 글로벌 증시 인사이트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-bg-glow app-bg-glow-1"></div>
    <div class="app-bg-glow app-bg-glow-2"></div>
    
    <div class="app-container">
        <header class="glass-header">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>Tony's Stock Today</h1>
            </div>
            <div class="header-right">
                <div class="last-updated">
                    <span class="pulse-dot"></span>
                    <span id="base-date-display">Live Data</span>
                </div>
            </div>
        </header>
        
        <!-- ▶ 네비게이션 탭 바 -->
        <nav class="app-navigation">
            <div class="tabs-container">
                <button class="tab-btn active" data-tab="tab-market">
                    <span class="tab-icon">📊</span>
                    <span>Global지수</span>
                </button>
                <button class="tab-btn" data-tab="tab-companies">
                    <span class="tab-icon">🏢</span>
                    <span>Sector기업</span>
                </button>
            </div>
        </nav>
        
        <main class="main-content">
            <!-- 1. 글로벌 주요 증시 현황 -->
            <section class="dashboard-section" id="market-overview-section">
                <div class="section-header">
                    <h2 id="market-title">글로벌 주요 증시 현황</h2>
                    <p>대표적인 글로벌 지수의 국가별 현황 및 등락률</p>
                </div>
                <div id="market-overview-container">
                    <!-- JS Injected (Grouped by Country) -->
                </div>
            </section>

            <!-- 2. 한/미 섹터별 등락 -->
            <section class="dashboard-section" id="sector-performance-section">
                <div class="section-header">
                    <h2 id="sector-title">섹터별 성과 분석 (대표 ETF 기준)</h2>
                    <p>전체 산업 섹터별 대표 ETF의 세부 등락률</p>
                </div>
                <div style="display: flex; flex-direction: column; gap: 2rem;">
                    <div class="column glass-card">
                        <div class="column-header">
                            <span class="flag">🇺🇸</span>
                            <h3>미국 핵심 섹터 (SPDR)</h3>
                        </div>
                        <div class="table-container">
                            <table id="us-sectors-table" class="data-table">
                                <!-- JS Injected -->
                            </table>
                        </div>
                    </div>
                    <div class="column glass-card">
                        <div class="column-header">
                            <span class="flag">🇰🇷</span>
                            <h3>한국 핵심 섹터 (KODEX)</h3>
                        </div>
                        <div class="table-container">
                            <table id="kr-sectors-table" class="data-table">
                                <!-- JS Injected -->
                            </table>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 3. 섹터별 대표 기업 등락 -->
            <section class="dashboard-section" id="company-performance-section">
                <div class="section-header">
                    <h2>🏢 섹터별 주요 대표 기업 현황</h2>
                    <p>테크, 금융, 자동차 핵심 3개 섹터의 주요 5개 기업 변동성</p>
                </div>
                <div id="companies-container">
                    <!-- JS Injected (Grouped by Sector) -->
                </div>
            </section>

        </main>
        
        <footer class="app-footer">
            <p>&copy; <span id="current-year">2026</span> Tony's Stock Today.</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>

    <!-- 관련주 모달 -->
    <div id="related-stocks-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(5px); z-index:9999; justify-content:center; align-items:center;">
        <div class="glass-card" style="padding:2rem; max-width:400px; width:90%; position:relative; max-height:80vh; display:flex; flex-direction:column;">
            <button onclick="document.getElementById('related-stocks-modal').style.display='none'" style="position:absolute; top:15px; right:20px; background:transparent; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
            <h3 style="margin-bottom:1rem; color:var(--accent-brand);">동일 산업군 기업 리스트</h3>
            <div id="related-stocks-list" style="display:flex; flex-direction:column; gap:10px; overflow-y:auto; flex-grow:1;">
            </div>
        </div>
    </div>

</body>
</html>
