name: 🔔 Render 서버 슬립 방지

on:
  schedule:
    # UTC 기준 매 14분마다 실행 (Render 무료 플랜 15분 슬립 방지)
    # Public 레포 기준 GitHub Actions 완전 무료 무제한
    - cron: '*/14 * * * *'
  workflow_dispatch: # 수동 실행 (Actions 탭에서 언제든 테스트 가능)

jobs:
  ping:
    name: Ping
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: 🏓 /ping 요청
        run: |
          # curl 실패(타임아웃·연결 거부)시 "000" 반환 → 워크플로우 오류 없이 진행
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "https://tony-stock-news.onrender.com/ping" || echo "000")
          echo "응답 코드: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ 서버 정상"
          else
            echo "⚠️ 응답 없음 (코드: $STATUS) - Render 슬립 해제 중일 수 있음 (정상)"
          fi
